<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}古籍校勘比对系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2c3e50;">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-book-half"></i>
                <span class="ms-2">古籍校勘比对系统</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house-door"></i> 首页
                        </a>
                    </li>
                    {% if project is defined and project %}
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}">
                            <i class="bi bi-info-circle"></i> 项目详情
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}/passages">
                            <i class="bi bi-file-text"></i> 段落管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}/compare">
                            <i class="bi bi-layout-split"></i> 版本对照
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}/proposals">
                            <i class="bi bi-lightbulb"></i> 校勘方案
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}/recommended">
                            <i class="bi bi-file-earmark-text"></i> 推荐文本
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}/dashboard">
                            <i class="bi bi-bar-chart"></i> 进度仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}/export">
                            <i class="bi bi-download"></i> 导出
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}/graph">
                            <i class="bi bi-diagram-3"></i> 知识图谱
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/projects/{{ project.id }}/transmission">
                            <i class="bi bi-graph-down-arrow"></i> 传播分析
                        </a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> {{ success }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="mt-5 py-4 text-center text-muted" style="background-color: #f8f5f0;">
        <div class="container">
            <p class="mb-0">古籍校勘比对系统 &copy; 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
