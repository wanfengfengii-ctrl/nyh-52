{% extends "base.html" %}

{% block title %}新建校勘项目{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card" style="background-color: #f5f0e8; border-color: #d4c5a9;">
            <div class="card-header" style="background-color: #2c3e50; color: white;">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> 新建校勘项目</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/projects/create">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">项目名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required
                               placeholder="例如：《论语》宋明版本校勘">
                    </div>
                    
                    <div class="mb-3">
                        <label for="book_title" class="form-label fw-bold">古籍书名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="book_title" name="book_title" required
                               placeholder="例如：论语">
                    </div>
                    
                    <div class="mb-4">
                        <label for="description" class="form-label fw-bold">项目描述</label>
                        <textarea class="form-control" id="description" name="description" rows="4"
                                  placeholder="简要描述校勘目的、版本范围等信息"></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> 返回
                        </a>
                        <button type="submit" class="btn btn-primary" style="background-color: #c0392b; border-color: #c0392b;">
                            <i class="bi bi-check-circle"></i> 创建项目
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
